<header>
  <h1>{{ title() }}</h1>
  <nav>
    @for (item of navItems; track item.id) {
      <button
        [class.active]="activeView() === item.id"
        (click)="setView(item.id)">
        {{ item.label }}
      </button>
    }
  </nav>
</header>

<main>
  @if (activeView() === 'debounced-search') {
    <app-debounced-search></app-debounced-search>
  }
  @if (activeView() === 'reactive-form') {
    <app-reactive-form></app-reactive-form>
  }
  @if (activeView() === 'onpush-demo') {
    <app-onpush-demo></app-onpush-demo>
  }
  @if (activeView() === 'rxjs-operators') {
    <app-rxjs-operators></app-rxjs-operators>
  }
  @if (activeView() === 'data-table') {
    <app-data-table-demo></app-data-table-demo>
  }
</main>
